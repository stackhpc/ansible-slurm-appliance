---
weka_configurations:
  - comment: Mount WEKA file system as /scratch
    weka_enable:
        clients: "{{ inventory_hostname in groups['weka_clients'] }}"
    weka_servers:
      - "172.17.104.1"
      - "172.17.104.2"
      - "172.17.104.3"
      - "172.17.104.4"
      - "172.17.104.5"
      - "172.17.104.6"
      - "172.17.104.7"
      - "172.17.104.8"
      - "172.17.104.9"
      - "172.17.104.10"
    weka_export: "/scratch_fs"
    weka_client_mnt_point: "/scratch"
    weka_client_mnt_options: 'net=udp'
