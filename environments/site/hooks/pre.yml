---
- name: Create NFS symlinks
  hosts: cluster:!builder
  become: true
  tasks:
    # Symlink /home to /storage/simple/users
    - name: Ensure /home symlink exists
      ansible.builtin.file:
        dest: /home
        src: /storage/simple/users
        follow: false
        force: true
        group: root
        owner: root
        state: link
    - name: Ensure /nfs symlink exists
      ansible.builtin.file:
        dest: /nfs
        src: /storage/replicated/nfs
        follow: false
        force: true
        group: root
        owner: root
        state: link
    - name: Ensure /trinity exists
      ansible.builtin.file:
        path: /trinity
        owner: root
        group: root
        state: directory

    - name: Ensure /trinity/shared exists
      ansible.builtin.file:
        dest: /trinity/shared
        src: /storage/replicated/nfs
        follow: false
        force: true
        group: root
        owner: root
        state: link

- name: Ensure /var/lib/home directory exists
  hosts: cluster
  become: true
  tasks:
    - ansible.builtin.file:
        path: /var/lib/home
        owner: root
        group: root
        state: directory

- name: Configure NFS v4 identity mapping
  hosts: cluster
  become: true
  tasks:
    - ansible.builtin.lineinfile:
        path: /etc/idmapd.conf
        regexp: '^#Domain = local.domain.edu$'
        line: 'Domain = cluster'
