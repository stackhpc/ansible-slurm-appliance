# CVE-2026-1229: CIRCL has an incorrect calculation in secp384r1 CombinedMult in github.com/cloudflare/circl
# https://osv.dev/vulnerability/GO-2026-4550
# https://github.com/grafana/grafana/issues/120256
# For grafana it is not vulerable:
# - govulncheck finds it vulnerable, but
# - go tool nm /usr/share/grafana/bin/grafana | grep "CombinedMult"
#   does not find CombinedMult from circl/ecc/p384, only from
#     - crypto/elliptic (i.e stdlib)
#     - circl/ecc/goldilocks
#   So the govulncheck is a false +ve.
# - Anyway CVE record states "ECDH and ECDSA signing relying on this curve are not affected."
#   so standard SSL using this library would be fine
  - vulnerability: GO-2026-4550
    package:
      location: /usr/share/grafana/bin/grafana

