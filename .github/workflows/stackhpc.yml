---

# Test deployment and reimage on OpenStack.
# This workflow can run standalone or as part of the main CI workflow.
# See the workflow file 'main.yml' for how this is CI triggered.

name: Test deployment and reimage on OpenStack
'on':
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  openstack:
    name: openstack-ci
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false # allow other matrix jobs to continue even if one fails
      matrix:
        os_version:
          - RL8
          - RL9
    env:
      ANSIBLE_FORCE_COLOR: 'true'
      OS_CLOUD: openstack
      TF_VAR_cluster_name: slurmci-${{ matrix.os_version }}-${{ github.run_number }}
      CI_CLOUD: ${{ vars.CI_CLOUD }} # default from repo settings
      TF_VAR_os_version: ${{ matrix.os_version }}
      STACKHPC_TF_DIR: environments/.stackhpc/tofu
    steps:

      - name: Find the latest release
        run: |
          echo "LATEST_RELEASE_TAG=$(curl -s https://api.github.com/repos/stackhpc/ansible-slurm-appliance/releases/latest | jq -r .tag_name)" >> "$GITHUB_ENV"

      - name: Checkout latest release
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.LATEST_RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: true

      - name: Override CI_CLOUD if PR label is present
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          # Iterate over the labels
          echo "$LABELS"
          for label in $LABELS; do
             if [[ $label == CI_CLOUD=* ]]; then
              # Extract the value after 'CI_CLOUD='
              CI_CLOUD_OVERRIDE="${label#CI_CLOUD=}"
              echo "CI_CLOUD=${CI_CLOUD_OVERRIDE}" >> "$GITHUB_ENV"
            fi
          done
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}

      - name: Record debug info
        run: |
          (
          echo "LATEST_RELEASE_TAG: $LATEST_RELEASE_TAG"
          echo "CI_CLOUD: $CI_CLOUD"
          ) | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Remove old bastion configuration
        # TODO: Remove once this path is not present in the last release
        run: |
          rm -f environments/.stackhpc/inventory/group_vars/all/bastion.yml
          echo "ci_cloud: ${CI_CLOUD}" > environments/.stackhpc/inventory/group_vars/all/ci.yml

      - name: Setup ssh
        run: |
          set -x
          mkdir -p ~/.ssh

          # setup bastion/keypair private key:
          echo "$SECRETS_SSH_KEY" > "${BASTION_KEYFILE}"
          chmod 0600 "${BASTION_KEYFILE}"
          ssh-keygen -f "${BASTION_KEYFILE}" -y # tests key format is correct

          # accept bastion hostkeys
          cat >> ~/.ssh/known_hosts <<< "${VARS_BASTION_FINGERPRINTS}"

          {
            # setup bastion/keypair for Ansible:
            # NB Do NOT change this to use ProxyJump, it doesn't pickup the key
            echo "ANSIBLE_SSH_COMMON_ARGS=-i ${BASTION_KEYFILE} -o ProxyCommand='ssh -i ${BASTION_KEYFILE} -W %h:%p ${BASTION_USER}@${BASTION_HOST}'"

            # make bastion details directly available for ondemand checks:
            echo "BASTION_USER=${BASTION_USER}"
            echo "BASTION_HOST=${BASTION_HOST}"
            echo "BASTION_KEYFILE=${BASTION_KEYFILE}"
          } >> "$GITHUB_ENV"

          echo "bastion details:"
          cat "$GITHUB_ENV"
        env:
          BASTION_KEYFILE: /home/runner/.ssh/bastion_key
          SECRETS_SSH_KEY: ${{ secrets[format('{0}_SSH_KEY', env.CI_CLOUD)] }} # zizmor: ignore[overprovisioned-secrets]
          BASTION_HOST: ${{ vars[format('{0}_BASTION_HOST', env.CI_CLOUD)] }}
          BASTION_USER: slurm-app-ci # currently same for both CI clouds
          VARS_BASTION_FINGERPRINTS: ${{ vars.BASTION_FINGERPRINTS }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Cache pip
        # Don't cache galaxy/requirements.yml as during dev its common for this
        # to use branch names
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install ansible, pip and galaxy requirements
        run: dev/setup-env.sh
        env:
          PYTHON_VERSION: python3  # overrides os-release discovery logic

      - name: Install OpenTofu
        run: |
          TOFU_VERSION=1.9.0
          cd /tmp
          curl -sSfLO https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz
          curl -sSfLO https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_SHA256SUMS
          sha256sum -c --ignore-missing tofu_${TOFU_VERSION}_SHA256SUMS
          cd /usr/bin && sudo tar xvf /tmp/tofu_${TOFU_VERSION}_linux_amd64.tar.gz tofu
          rm /tmp/tofu_${TOFU_VERSION}_*

      - name: Initialise tofu
        run: tofu init
        working-directory: ${{ env.STACKHPC_TF_DIR }}

      - name: Write clouds.yaml
        run: |
          mkdir -p ~/.config/openstack/
          echo "$SECRETS_CLOUD" > ~/.config/openstack/clouds.yaml
        shell: bash
        env:
          SECRETS_CLOUD: ${{ secrets[format('{0}_CLOUDS_YAML', env.CI_CLOUD)] }} # zizmor: ignore[overprovisioned-secrets]

      - name: Setup environment-specific inventory/tofu inputs
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          echo "vault_demo_user_password: $DEMO_USER_PASSWORD" > "$APPLIANCES_ENVIRONMENT_ROOT/inventory/group_vars/all/test_user.yml"
        env:
          DEMO_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Cleanup any OpenStack resources from previous attempts
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ./dev/delete-cluster.py "${TF_VAR_cluster_name}" --force

      - name: Provision nodes using latest release image
        id: provision_servers
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          cd "$STACKHPC_TF_DIR"
          max_retries=3
          delay=30
          for i in $(seq 1 $max_retries); do
            tofu apply -auto-approve -var-file="${CI_CLOUD}.tfvars" && break
            [ "$i" -lt "$max_retries" ] && sleep $delay || exit 1
          done

      - name: Delete infrastructure if provisioning failed
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          cd "$STACKHPC_TF_DIR"
          tofu destroy -auto-approve -var-file="${CI_CLOUD}.tfvars"
        if: failure() && steps.provision_servers.outcome == 'failure'

      - name: Configure cluster at latest release
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible all -vvvv -m wait_for_connection
          ansible-playbook ansible/adhoc/generate-passwords.yml
          ansible-playbook -v ansible/site.yml
          ansible-playbook -v ansible/ci/check_slurm.yml

      - name: Run MPI-based tests at latest release
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible-playbook -vv ansible/adhoc/hpctests.yml --tags pingpong

      - name: Checkout current branch
        run: git checkout --force "$GITHUB_HEAD_REF_OR_NAME"
        env:
          GITHUB_HEAD_REF_OR_NAME: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Update ansible, pip and galaxy requirements
        run: dev/setup-env.sh
        env:
          PYTHON_VERSION: python3 # overrides os-release discovery logic

      - name: Reimage login and control nodes to image in current branch
        id: reimage_non_compute
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          cd "$STACKHPC_TF_DIR"
          tofu init
          max_retries=3
          delay=30
          for i in $(seq 1 $max_retries); do
            tofu apply -auto-approve -var-file="${CI_CLOUD}.tfvars" && break
            [ "$i" -lt "$max_retries" ] && sleep $delay || exit 1
          done

      - name: Configure cluster using current branch
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible all -m wait_for_connection
          ansible-playbook ansible/adhoc/generate-passwords.yml
          ansible-playbook -vv ansible/site.yml
          ansible-playbook -v ansible/ci/check_slurm.yml

      - name: Reimage compute nodes to image in current branch using slurm
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible-playbook -v ansible/adhoc/rebuild-via-slurm.yml
          ansible-playbook -v ansible/ci/check_slurm.yml
          ansible-playbook -v ansible/ci/check_compute_rebuild.yml

      - name: Check sacct state survived reimage to current branch
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible-playbook -vv ansible/ci/check_sacct_hpctests.yml

      - name: Check MPI-based tests are shown in Grafana
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible-playbook -vv ansible/ci/check_grafana.yml

      - name: Run MPI-based tests again in current branch
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible-playbook -vv ansible/adhoc/hpctests.yml

      - name: Run EESSI tests
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          ansible-playbook -vv ansible/ci/check_eessi.yml

      - name: Confirm Open Ondemand is up (via SOCKS proxy)
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate

          # load ansible variables into shell:
          ansible-playbook ansible/ci/output_vars.yml \
            -e output_vars_hosts=openondemand \
            -e output_vars_path="$APPLIANCES_ENVIRONMENT_ROOT/vars.txt" \
            -e output_vars_items=openondemand_servername
          source "$APPLIANCES_ENVIRONMENT_ROOT/vars.txt"

          # setup ssh proxying:
          sudo apt-get --yes install proxychains
          echo proxychains installed
          ssh -v -fN -D 9050 -i "${BASTION_KEYFILE}" "${BASTION_USER}@${BASTION_HOST}"
          echo port 9050 forwarded

          # check OOD server returns 200:
          statuscode=$(proxychains wget \
            --quiet \
            --spider \
            --server-response \
            --no-check-certificate \
            --http-user=demo_user \
            --http-password="${DEMO_USER_PASSWORD}" "https://${openondemand_servername}" \
            2>&1)
          (echo "$statuscode" | grep "200 OK") || (echo "$statuscode"  && exit 1)
        env:
          DEMO_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Delete possible volume snapshot from slurm upgrade
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          if [ -n "$SNAPSHOT" ]
          then
              echo "Deleting $SNAPSHOT"
              openstack volume snapshot delete "$SNAPSHOT"
          fi

      - name: Delete infrastructure
        run: |
          . venv/bin/activate
          . environments/.stackhpc/activate
          cd "$STACKHPC_TF_DIR"
          tofu destroy -auto-approve -var-file="${CI_CLOUD}.tfvars" || echo "tofu failed in $STACKHPC_TF_DIR"
        if: ${{ success() || cancelled() }}
