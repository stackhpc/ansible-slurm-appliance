name: Workflow Cleanup
'on':
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: "The build output cannot be affected by user parameters other than the build entry point and the top-level source location. GitHub Actions workflow_dispatch inputs MUST be empty. "
    inputs:
      ci_cloud:
        description: 'Select the CI_CLOUD'
        required: true
        type: choice
        options:
          - LEAFCLOUD
          - SMS
          - ARCUS
      cluster_name:
        description: 'Cluster to delete (workflow run number)'
        type: string
        required: true


permissions: {}

jobs:
  ci_cluster_cleanup:
    name: ci-cluster-cleanup
    runs-on: ubuntu-24.04
    env:
      OS_CLOUD: openstack
      CI_CLOUD: ${{ github.event.inputs.ci_cloud }}
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Input Variables
        run: |
          echo "CI_CLOUD: ${CI_CLOUD}"
          echo "CLUSTER_NAME: ${CLUSTER_NAME}"

      - name: Check Cluster Name not empty
        run: |
          if [ -z "${CLUSTER_NAME}" ]; then
            echo "Cluster name is empty"
            exit 1
          else
            echo "Cluster name is not empty"
          fi

      - name: Setup environment
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install -U pip
          pip install "$(grep -o 'python-openstackclient[><=0-9\.]*' requirements.txt)"
        shell: bash

      - name: Write clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          echo "$SECRETS_CLOUD" > ~/.config/openstack/clouds.yaml
        shell: bash
        env:
          SECRETS_CLOUD: ${{ secrets[format('{0}_CLOUDS_YAML', env.CI_CLOUD)] }} # zizmor: ignore[overprovisioned-secrets]

      - name: Delete CI cluster
        run: |
          . venv/bin/activate
          ./dev/delete-cluster.py "slurmci-RL8-${CLUSTER_NAME}" --force
          ./dev/delete-cluster.py "slurmci-RL9-${CLUSTER_NAME}" --force
        shell: bash
