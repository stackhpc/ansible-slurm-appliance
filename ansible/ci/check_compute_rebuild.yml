- hosts: control
  gather_facts: true
  become: false
  tasks:
    - name: Set localhost fact for appliance image version
      set_fact:
        appliance_image_label: "RL{{ ansible_distribution_major_version }}"
      delegate_to: localhost
      delegate_facts: true

- hosts: localhost
  become: false
  gather_facts: false
  tasks:
    - name: Get latest release info
      ansible.builtin.uri:
        url: https://api.github.com/repos/stackhpc/ansible-slurm-appliance/releases/latest
      register: ci_uri_latest_release

    - name: Set fact for latest release tag
      ansible.builtin.set_fact:
        ci_latest_release_tag: "{{ ci_uri_latest_release.json.tag_name }}"

    - name: Ensure tags fetched
      ansible.builtin.command: # noqa: command-instead-of-module
        cmd: git fetch --tags
        chdir: "{{ appliances_repository_root }}"
      changed_when: true

    - name: Get cluster image file contents at latest release
      ansible.builtin.command:
        cmd: "git show {{ ci_latest_release_tag }}:environments/.stackhpc/tofu/cluster_image.auto.tfvars.json"
      register: git_show_cluster_image
      changed_when: false

    - name: Check if current branch image differs from last release
      ansible.builtin.set_fact:
        ci_cluster_image_updated: "{{ latest_release_image != current_image }}"
      vars:
        latest_release_image: "{{ (git_show_cluster_image.stdout | from_json).cluster_image[appliance_image_label] }}"
        current_image: "{{ (lookup('file', 'environments/.stackhpc/tofu/cluster_image.auto.tfvars.json') | from_json).cluster_image[appliance_image_label] }}"

- ansible.builtin.import_playbook: ../adhoc/rebuild-status.yml

- hosts: compute
  become: false
  gather_facts: false
  vars:
    uptime_max_seconds: "{{ 5 * 60 }}"
  tasks:
    - name: Check node is on correct image
      ansible.builtin.assert:
        that: rebuild_status.image_correct
        fail_msg: |
          Node is NOT on correct image:
            Current image ID: {{ rebuild_status.image_id_current }}
            Target image ID: {{ rebuild_status.image_id_target }}

    - name: Check a single rebuild has occurred, if target image differs from last release
      ansible.builtin.assert:
        that: rebuild_status.rebuild_count == 1
        fail_msg: "Expected 1 rebuild, found {{ rebuild_status.rebuild_count }}"
      when: hostvars['localhost'].ci_cluster_image_updated

    - name: Check uptime shows rebuild or reboot occurred
      ansible.builtin.assert:
        that: rebuild_status.uptime_seconds < uptime_max_seconds | int
        fail_msg: "Expected uptime < {{ uptime_max_seconds }}s, actual {{ rebuild_status.uptime_seconds }}s"
