---

- name: Check mount directories
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: _mounts_mountpoints
  loop: "{{ mounts.values() }}"
  when: item.enabled | default(true)

- name: Ensure mount directories exist
  ansible.builtin.file:
    path: "{{ stat_result.item.path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ _mounts_mountpoints.results | default([]) }}"
  loop_control:
    loop_var: stat_result
  when: (stat_result.stat | default(false)) and not stat_result.stat.exists

- name: Ensure tmp.mount mask status is correct
  # RL8-specific fix; otherwise rootfs comes up read-only after a reboot!
  # Note tmp.mount is a special case because the mount unit is shipped, rather
  # than being autogenerated: `ls /usr/lib/systemd/system/*.mount` shows
  # shipped ones.
  ansible.builtin.systemd:
    name: tmp.mount
    masked: "{{ tmp_masked }}"
  vars:
    tmp_mount: "{{ mounts_default.values() | selectattr('path', 'eq', '/tmp') }}"
    tmp_tmpfs: "{{ tmp_mount.0.fstype | default('') == 'tmpfs' }}"
    tmp_enabled: "{{ tmp_mount.0.enabled | default(true) }}"
    tmp_masked: "{{ false if ((tmp_mount | length > 0) and tmp_tmpfs and tmp_enabled) else true }}"

- name: Ensure mount
  ansible.posix.mount:
    path: "{{ item.value.path }}"
    src: "{{ item.value.src }}"
    fstype: "{{ item.value.fstype }}"
    state: "{{ item.value.state }}"
    opts: "{{ item.value.opts | default(omit) }}"
  loop: "{{ mounts | dict2items }}"
  when: item.value.enabled | default(true)
