---

- name: Create GPG key files
  ansible.builtin.copy:
    dest: "{{ item.value[ansible_distribution_major_version].path }}"
    content: |
      {{ item.value[ansible_distribution_major_version].key }}
    owner: root
    group: root
    mode: u=rw,go=r
  loop: "{{ dnf_repos_gpg_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: "'key' in item.value[ansible_distribution_major_version]"

- name: Import GPG keys
  # Don't need fingerprint as actual key hardcoded in repo
  ansible.builtin.rpm_key:
    key: "{{ item.value[ansible_distribution_major_version].path }}"
  loop: "{{ dnf_repos_gpg_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Replace non-epel repos with Pulp repos
  ansible.builtin.yum_repository:
    file: "{{ repo_values.repo_file }}"
    name: "{{ repo_name }}"
    baseurl: "{{ repo_content_url }}/{{ repo_values.pulp_path }}/{{ repo_values.pulp_timestamp }}"
    description: "{{ repo_name }}"
    username: "{{ dnf_repos_username }}"
    password: "{{ dnf_repos_password }}"
    gpgcheck: "{{ repo_values.gpgcheck | default(true) }}"
  loop: "{{ dnf_repos_repos | dict2items }}"
  loop_control:
    label: "{{ repo_name }}[{{ repo_os }}]: {{ repo_values }}"
  when:
    - repo_name != 'epel'
    - repo_values | length > 0
  vars:
    repo_os: "{{ ansible_distribution_version if ansible_distribution_version in item.value else ansible_distribution_major_version }}"
    repo_values: "{{ item.value.get(repo_os, {}) }}"
    repo_name: "{{ repo_values.repo_name | default(item.key) }}"
    repo_content_url: "{{ repo_values.pulp_content_url | default(dnf_repos_pulp_content_url) }}"

- name: Install epel-release
  # So roles installing epel via epel-release don't overwrite changes to the epel repo below
  ansible.builtin.dnf:
    name: epel-release

- name: Replace epel repo with Pulp repo
  ansible.builtin.yum_repository:
    file: "{{ repo_values.repo_file }}"
    name: "{{ repo_name }}"
    baseurl: "{{ repo_content_url }}/{{ repo_values.pulp_path }}/{{ repo_values.pulp_timestamp }}"
    description: "{{ repo_name }}"
    username: "{{ dnf_repos_username }}"
    password: "{{ dnf_repos_password }}"
    gpgcheck: "{{ repo_values.gpgcheck | default(true) }}"
  loop: "{{ dnf_repos_repos | dict2items }}"
  loop_control:
    label: "{{ repo_name }}[{{ repo_os }}]: {{ repo_values }}"
  when:
    - repo_name == 'epel'
    - repo_values | length > 0
  vars:
    repo_os: "{{ ansible_distribution_version if ansible_distribution_version in item.value else ansible_distribution_major_version }}"
    repo_values: "{{ item.value.get(repo_os, {}) }}"
    repo_name: "{{ repo_values.repo_name | default(item.key) }}"
    repo_content_url: "{{ repo_values.pulp_content_url | default(dnf_repos_pulp_content_url) }}"

- name: Disable all Perl module streams on Rocky 8
  ansible.builtin.command:
    cmd: dnf module disable perl -y
  changed_when: false
  when:
    - ansible_facts['distribution_major_version'] == "8"
    - "'builder' in group_names"

- name: Reset Perl module on Rocky 8 (workaround for conflicting module streams)
  ansible.builtin.command:
    cmd: dnf module reset perl -y
  changed_when: false
  # NOTE: This can be dropped when the base image is bumped to a version with consistent
  #       Perl module streams, but currently a newer base image does not exist.
  when:
    - ansible_facts['distribution_major_version'] == "8"
    - "'builder' in group_names"

- name: Sync all packages to repo versions (distro-sync)
  # NOTE(wszumski): Sync all packages after configuring repos as packages in
  # base image may be newer than snapshots or vice versa. This can lead to
  # dependency hell.
  ansible.builtin.command:
    cmd: dnf distro-sync -y --allowerasing
  register: distro_sync_result
  changed_when: "'Nothing to do' not in distro_sync_result.stdout"
  when:
    - "'builder' in group_names"
