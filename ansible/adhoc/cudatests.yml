---
- hosts: cuda
  gather_facts: true
  tags: cuda_bandwidth
  tasks:
    - name: Run CUDA bandwidth tasks
      ansible.builtin.import_role:
        name: cuda
        tasks_from: bandwidth.yml

- hosts: cuda
  gather_facts: true
  tags: cuda_samples
  tasks:
    - name: Compile and run cuda samples
      ansible.builtin.import_role:
        name: cuda
        tasks_from: samples.yml
